<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#f4f1ea" />
    <title>Zo Hackspaces</title>
    
    <!-- External Stylesheets -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    
    <div id="map-container">
        <div id="map"></div>
    </div>

    <header class="main-header">
    </header>

    <div id="center-panel">
      <div id="location-info">
        <img src="Z_to_House.gif" alt="Zo Hackspaces" class="logo-gif">
      </div>
    </div>

    <div id="list-container">
        <div class="list-header">
            <div class="location-filters">
                <button class="location-filter-btn active" data-location="all">All Hackspaces</button>
                <button class="location-filter-btn" data-location="bangalore">Bangalore</button>
                <button class="location-filter-btn" data-location="sanfrancisco">San Francisco</button>
            </div>
            <div class="search-and-view">
                <div class="search-bar">
                    <input type="text" placeholder="Search hackspaces" id="search-input">
                </div>
                <button class="view-all-btn">View All</button>
            </div>
            <div class="mobile-filters">
                <button class="filter-btn active" data-filter="dates">All Areas ▼</button>
                <button class="filter-btn" data-filter="hackspaces">All Hackspaces ▼</button>
            </div>
        </div>
        <ul id="location-list"></ul>
    </div>

    <!-- Calendar overlay removed as it's not applicable for static hackspaces -->

    <!-- Loading Overlay -->
    <div id="location-loading" class="loading-overlay">
      <div class="loading-content">
        <img src="spinner_Z_4.gif" alt="Loading" class="loading-spinner">
        <p>Discovering Zo Hackspaces</p>
        <small>Please allow location access for the best experience</small>
        <button id="manual-location-btn" class="manual-location-button" style="display: none;">
          📍 Try Location Again
        </button>
      </div>
    </div>

    <!-- External Scripts -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
    <script src="script.js"></script>

    <!-- Bottom Navigation Bar -->
    <nav id="bottom-nav" class="bottom-nav">
      <button class="nav-btn" data-section="members">
        <span class="nav-icon">👥</span>
        <span class="nav-label">Members</span>
      </button>
      <button class="nav-btn active" data-section="locations">
        <span class="nav-icon">🔧</span>
        <span class="nav-label">Hackspaces</span>
      </button>
      <button class="nav-btn" data-section="cultures">
        <span class="nav-icon">🌍</span>
        <span class="nav-label">Cultures</span>
      </button>
    </nav>
  </body>
</html>
