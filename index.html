<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Zo Quest — Rishikesh</title>
    <link rel="icon" href="Assets/icon.png" />
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- Map -->
    <div id="map-container">
      <div id="map"></div>
    </div>

    <!-- Header -->
    <header class="main-header">
      <img src="zo-white.png" alt="Zo" class="zo-logo">
      <span class="header-divider"></span>
      <span class="header-title">Rishikesh</span>
    </header>

    <!-- Category filter pills -->
    <div id="category-filters" class="category-filters"></div>

    <!-- Quest bottom panel -->
    <div id="quest-panel" class="quest-panel">
      <div class="quest-panel-handle"></div>
      <div class="quest-panel-header">
        <span class="quest-panel-title">Quests</span>
        <span id="quest-count" class="quest-count">0</span>
      </div>
      <ul id="quest-list" class="quest-list"></ul>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Loading screen -->
    <div id="loading-screen" class="loading-screen">
      <div class="loading-inner">
        <img src="spinner_Z_4.gif" alt="Loading" class="spinner-gif" />
        <p>Discovering Quests</p>
        <small>Rishikesh</small>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-section="quests">
        <span class="nav-icon">⚡</span>
        <span class="nav-label">Quests</span>
      </button>
      <button class="nav-btn" data-section="events">
        <span class="nav-icon">🎉</span>
        <span class="nav-label">Events</span>
      </button>
    </nav>

    <!-- Scripts -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
    <script src="script.js"></script>
  </body>
</html>
