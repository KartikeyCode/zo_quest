<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Zo Quest — Rishikesh</title>
    <link rel="icon" href="Assets/icon.png" />
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- Map -->
    <div id="map-container">
      <div id="map"></div>
    </div>

    <!-- Header -->
    <header class="main-header">
      <img src="zo-white.png" alt="Zo" class="zo-logo">
      <span class="header-divider"></span>
      <span class="header-title">Rishikesh</span>
      <div class="zo-balance-badge" id="zo-balance-area" style="display:none;">
        <span class="zo-balance-icon">⚡</span>
        <span id="zo-balance">$0</span>
      </div>
    </header>

    <!-- User menu & fake location -->
    <button id="user-menu-btn" class="user-menu-btn" style="display:none;">Sign Out</button>
    <button id="fake-location-btn" class="fake-location-btn" title="Fake Location (Testing)">📍</button>

    <!-- Category filter pills -->
    <div id="category-filters" class="category-filters"></div>

    <!-- Quest bottom panel -->
    <div id="quest-panel" class="quest-panel">
      <div class="quest-panel-handle"></div>
      <div class="quest-panel-header">
        <span class="quest-panel-title">Quests</span>
        <span id="quest-count" class="quest-count">0</span>
      </div>
      <ul id="quest-list" class="quest-list"></ul>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal-overlay" style="display:none;">
      <div class="modal-card">
        <h2 class="modal-title" id="auth-modal-title">Sign Up</h2>
        <form id="auth-form">
          <div id="username-field" class="form-group">
            <input type="text" id="auth-username" placeholder="Username">
          </div>
          <div class="form-group">
            <input type="email" id="auth-email" placeholder="Email" required>
          </div>
          <div class="form-group">
            <input type="password" id="auth-password" placeholder="Password (min 6 chars)" required minlength="6">
          </div>
          <div id="auth-error" class="form-error"></div>
          <button type="submit" class="auth-submit-btn" id="auth-submit-btn">Sign Up</button>
        </form>
        <p class="auth-toggle">
          Already have an account? <a href="#" id="auth-toggle-link">Log In</a>
        </p>
      </div>
    </div>

    <!-- Leaderboard Modal -->
    <div id="leaderboard-modal" class="modal-overlay" style="display:none;">
      <div class="modal-card leaderboard-card">
        <div class="modal-header">
          <h2 class="modal-title">Leaderboard</h2>
          <button id="leaderboard-close" class="modal-close">&times;</button>
        </div>
        <ul id="leaderboard-list" class="leaderboard-list"></ul>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Loading screen -->
    <div id="loading-screen" class="loading-screen">
      <div class="loading-inner">
        <img src="spinner_Z_4.gif" alt="Loading" class="spinner-gif" />
        <p>Discovering Quests</p>
        <small>Rishikesh</small>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-section="quests">
        <span class="nav-icon">⚡</span>
        <span class="nav-label">Quests</span>
      </button>
      <button class="nav-btn" data-section="leaderboard">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">Rank</span>
      </button>
      <button class="nav-btn" data-section="events">
        <span class="nav-icon">🎉</span>
        <span class="nav-label">Events</span>
      </button>
    </nav>

    <!-- Scripts -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
